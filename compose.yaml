name: iems-erp

x-app-security: &app-security
  security_opt:
    - no-new-privileges:true

x-api-env: &api-env
  APP_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
  ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-iemsnewdelhi.com}
  ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS for production}
  DIRECTOR_EMAIL: ${DIRECTOR_EMAIL:-director@iemsnewdelhi.com}
  SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL for production}
  SUPABASE_AUTH_ISSUER: ${SUPABASE_AUTH_ISSUER:?Set SUPABASE_AUTH_ISSUER explicitly for production}
  SUPABASE_AUTH_ISSUER_ALIASES: ${SUPABASE_AUTH_ISSUER_ALIASES:-}
  SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:?Set SUPABASE_JWKS_URL for production}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY for production}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY_FILE: ${SUPABASE_SERVICE_ROLE_KEY_FILE:-}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
  SUPABASE_JWT_SECRET_FILE: ${SUPABASE_JWT_SECRET_FILE:-}
  SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
  SUPABASE_REQUEST_TIMEOUT_SECONDS: ${SUPABASE_REQUEST_TIMEOUT_SECONDS:-5}
  REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/1
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
  RATE_LIMIT_DEFAULT_REQUESTS: ${RATE_LIMIT_DEFAULT_REQUESTS:-120}
  RATE_LIMIT_AUTH_REQUESTS: ${RATE_LIMIT_AUTH_REQUESTS:-30}
  RATE_LIMIT_UPLOAD_REQUESTS: ${RATE_LIMIT_UPLOAD_REQUESTS:-20}
  RATE_LIMIT_EXPORT_REQUESTS: ${RATE_LIMIT_EXPORT_REQUESTS:-10}
  RATE_LIMIT_ADMIN_REQUESTS: ${RATE_LIMIT_ADMIN_REQUESTS:-60}
  RATE_LIMIT_TRUST_PROXY_HEADERS: ${RATE_LIMIT_TRUST_PROXY_HEADERS:-true}
  SIGNED_URL_TTL_SECONDS: ${SIGNED_URL_TTL_SECONDS:-900}
  ARCHIVE_EXPORT_TTL_HOURS: ${ARCHIVE_EXPORT_TTL_HOURS:-24}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
  ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES:-application/pdf,image/jpeg,image/png,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
  PROJECT_DOCUMENTS_BUCKET: ${PROJECT_DOCUMENTS_BUCKET:-project-documents}
  GENERATED_ARCHIVES_BUCKET: ${GENERATED_ARCHIVES_BUCKET:-generated-archives}
  MODULE_PROJECTS_ENABLED: ${MODULE_PROJECTS_ENABLED:-true}
  MODULE_DOCUMENTS_ENABLED: ${MODULE_DOCUMENTS_ENABLED:-true}
  MODULE_ARCHIVE_EXPORTS_ENABLED: ${MODULE_ARCHIVE_EXPORTS_ENABLED:-true}
  MODULE_PHYSICAL_ARCHIVE_ENABLED: ${MODULE_PHYSICAL_ARCHIVE_ENABLED:-true}
  MODULE_ATTENDANCE_ENABLED: ${MODULE_ATTENDANCE_ENABLED:-true}
  MODULE_LEAVE_ENABLED: ${MODULE_LEAVE_ENABLED:-true}
  MODULE_TASKS_ENABLED: ${MODULE_TASKS_ENABLED:-true}
  MODULE_CALENDAR_ENABLED: ${MODULE_CALENDAR_ENABLED:-true}
  MODULE_APPROVALS_ENABLED: ${MODULE_APPROVALS_ENABLED:-true}
  MODULE_DIRECTOR_DASHBOARD_ENABLED: ${MODULE_DIRECTOR_DASHBOARD_ENABLED:-true}
  MODULE_ADMIN_ENABLED: ${MODULE_ADMIN_ENABLED:-true}

services:
  web:
    <<: *app-security
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    environment:
      NODE_ENV: production
      # Runtime override so server-side Next.js (middleware, auth routes) can
      # reach Supabase from inside the container. In local Docker set this to
      # http://host.docker.internal:54321; in production use the managed URL.
      SUPABASE_URL: ${SUPABASE_URL}
      # Browser-accessible Supabase URL injected at runtime so auth/signin can
      # rewrite the OAuth redirect from the container-internal address to one
      # the user's browser can reach. Must differ from SUPABASE_URL in local
      # Docker (e.g. http://127.0.0.1:54321 vs http://host.docker.internal:54321).
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      # Anon key and API URL are baked into the bundle at build time but also
      # present here so Next.js server.js has them in process.env at runtime.
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_URL: /api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
    networks:
      - frontend

  api:
    <<: *app-security
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    environment:
      <<: *api-env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - backend
      - egress

  worker:
    <<: *app-security
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO"]
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL for production}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY_FILE: ${SUPABASE_SERVICE_ROLE_KEY_FILE:-}
      SUPABASE_REQUEST_TIMEOUT_SECONDS: ${SUPABASE_REQUEST_TIMEOUT_SECONDS:-5}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/1
      ARCHIVE_EXPORT_TTL_HOURS: ${ARCHIVE_EXPORT_TTL_HOURS:-24}
      PROJECT_DOCUMENTS_BUCKET: ${PROJECT_DOCUMENTS_BUCKET:-project-documents}
      GENERATED_ARCHIVES_BUCKET: ${GENERATED_ARCHIVES_BUCKET:-generated-archives}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - backend
      - egress

  scheduler:
    <<: *app-security
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "beat",
        "--loglevel=INFO",
        "--schedule=/var/run/celery/celerybeat-schedule",
      ]
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /var/run/celery:uid=10001,gid=10001,mode=700,size=16m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - backend
      - egress

  redis:
    <<: *app-security
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD for production Redis auth}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - backend

  caddy:
    image: iems-erp-caddy
    build:
      context: ./infrastructure/caddy
      dockerfile: Dockerfile
    environment:
      IEMS_DOMAIN: ${IEMS_DOMAIN:?Set IEMS_DOMAIN before starting TLS}
      # Injected into the Caddyfile CSP connect-src so the browser Supabase
      # client can reach Supabase. Local Docker: http://127.0.0.1:54321.
      # Production: https://xxx.supabase.co (already covered by *.supabase.co).
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?Set NEXT_PUBLIC_SUPABASE_URL for production}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - frontend
      - backend

volumes:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  frontend:
  egress:
  backend:
    internal: true
