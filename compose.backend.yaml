name: iems-erp-backend

services:
  web:
    profiles: ["disabled-in-backend-only-deploy"]

  caddy:
    profiles: ["disabled-in-backend-only-deploy"]

  api:
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV explicitly for backend-only deploy}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/1
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

  worker:
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV explicitly for backend-only deploy}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/1

  scheduler:
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV explicitly for backend-only deploy}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD for backend-only deploy}@redis:6379/1
